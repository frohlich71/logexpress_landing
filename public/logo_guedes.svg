<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 172 340 616" width="340" height="616" role="img" aria-label="Brasão da família Guedes">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2b8"/>
      <stop offset="0.25" stop-color="#f5cf5e"/>
      <stop offset="0.55" stop-color="#d69f22"/>
      <stop offset="1" stop-color="#9c6a09"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7b53f"/>
      <stop offset="1" stop-color="#7c5205"/>
    </linearGradient>
    <linearGradient id="blueField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3fb8"/>
      <stop offset="1" stop-color="#141f6e"/>
    </linearGradient>
    <linearGradient id="blueLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3448c8"/>
      <stop offset="1" stop-color="#1a2078"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f6fb"/>
      <stop offset="0.45" stop-color="#c3cad6"/>
      <stop offset="0.7" stop-color="#8a94a6"/>
      <stop offset="1" stop-color="#5a6474"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa3b3"/>
      <stop offset="1" stop-color="#454d5e"/>
    </linearGradient>

    <!-- Flor-de-lis centrada na origem -->
    <g id="fleur">
      <path fill="url(#gold)" stroke="#6e4a06" stroke-width="1"
        d="M0 -32 C 6 -20 11 -10 8 2 C 5 -2 -5 -2 -8 2 C -11 -10 -6 -20 0 -32 Z"/>
      <path fill="url(#gold)" stroke="#6e4a06" stroke-width="1"
        d="M8 0 C 24 -6 34 4 30 18 C 28 26 18 26 16 17 C 20 20 26 17 24 11 C 21 6 13 6 9 10 Z"/>
      <path fill="url(#gold)" stroke="#6e4a06" stroke-width="1"
        d="M-8 0 C -24 -6 -34 4 -30 18 C -28 26 -18 26 -16 17 C -20 20 -26 17 -24 11 C -21 6 -13 6 -9 10 Z"/>
      <path fill="url(#gold)" stroke="#6e4a06" stroke-width="1"
        d="M-9 8 L9 8 C 8 20 6 27 3 35 C 2 31 -2 31 -3 35 C -6 27 -8 20 -9 8 Z"/>
      <path fill="url(#goldDeep)" stroke="#6e4a06" stroke-width="1"
        d="M-18 -1 L18 -1 Q21 -1 21 3 L21 5 Q21 9 18 9 L-18 9 Q-21 9 -21 5 L-21 3 Q-21 -1 -18 -1 Z"/>
    </g>

    <!-- Folha de acanto para o manto -->
    <g id="leaf">
      <path d="M0 0 C 8 6 9 17 3 26 C 1 29 -1 29 -3 25 C -8 16 -7 6 0 0 Z"/>
    </g>
  </defs>

  <!-- ===================== MANTO / ACANTO ===================== -->
  <g stroke-linejoin="round">
    <!-- massas de fundo (asas) -->
    <path fill="url(#goldDeep)" opacity="0.95"
      d="M330 310 C 392 296 452 322 456 384 C 460 446 438 512 398 560 C 420 496 430 420 408 376 C 392 344 364 326 330 328 Z"/>
    <path fill="url(#goldDeep)" opacity="0.95"
      d="M310 310 C 248 296 188 322 184 384 C 180 446 202 512 242 560 C 220 496 210 420 232 376 C 248 344 276 326 310 328 Z"/>

    <!-- folhas direita -->
    <g fill="url(#gold)" stroke="#6e4a06" stroke-width="0.8">
      <use href="#leaf" transform="translate(348,306) rotate(-18) scale(3.4)"/>
      <use href="#leaf" transform="translate(392,290) rotate(-58) scale(3.6)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(426,300) rotate(-92) scale(3.3)"/>
      <use href="#leaf" transform="translate(444,332) rotate(-124) scale(2.8)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(448,368) rotate(-156) scale(2.3)"/>
      <use href="#leaf" transform="translate(356,336) rotate(206) scale(3.4)"/>
      <use href="#leaf" transform="translate(392,384) rotate(232) scale(3.5)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(420,436) rotate(252) scale(3.2)"/>
      <use href="#leaf" transform="translate(434,492) rotate(276) scale(2.7)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(430,540) rotate(300) scale(2.2)"/>
    </g>
    <!-- folhas esquerda (espelhadas em x=320) -->
    <g fill="url(#gold)" stroke="#6e4a06" stroke-width="0.8">
      <use href="#leaf" transform="translate(292,306) rotate(18) scale(3.4)"/>
      <use href="#leaf" transform="translate(248,290) rotate(58) scale(3.6)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(214,300) rotate(92) scale(3.3)"/>
      <use href="#leaf" transform="translate(196,332) rotate(124) scale(2.8)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(192,368) rotate(156) scale(2.3)"/>
      <use href="#leaf" transform="translate(284,336) rotate(-206) scale(3.4)"/>
      <use href="#leaf" transform="translate(248,384) rotate(-232) scale(3.5)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(220,436) rotate(-252) scale(3.2)"/>
      <use href="#leaf" transform="translate(206,492) rotate(-276) scale(2.7)" fill="url(#blueLeaf)"/>
      <use href="#leaf" transform="translate(210,540) rotate(-300) scale(2.2)"/>
    </g>
  </g>

  <!-- ===================== ELMO (elmo de cavaleiro, de justa) ===================== -->
  <g stroke="#3b4250" stroke-width="2" stroke-linejoin="round">
    <!-- gorjal / base pescoço -->
    <path fill="url(#metalDark)"
      d="M290 296 C 300 288 342 288 352 296 C 360 308 360 322 350 332 C 324 344 300 344 276 332 C 266 320 276 306 290 296 Z"/>
    <!-- lâminas do gorjal -->
    <path fill="none" stroke="#2b303c" stroke-width="1.6" opacity="0.7"
      d="M283 314 C 308 322 336 322 359 313"/>
    <!-- crânio (calota) -->
    <path fill="url(#metal)"
      d="M316 194
         C 342 195 360 210 365 234
         C 369 253 366 273 358 288
         C 351 300 338 305 322 304
         C 318 292 316 274 317 258
         C 318 236 320 214 316 194 Z"/>
    <!-- viseira frontal (voltada à esquerda) -->
    <path fill="url(#metalDark)"
      d="M317 200
         C 305 202 294 210 286 222
         C 278 234 272 248 269 262
         C 266 276 268 288 276 296
         C 286 302 300 304 314 302
         C 320 298 322 288 321 274
         C 320 250 320 222 317 200 Z"/>
    <!-- aresta central da viseira -->
    <path fill="none" stroke="#eef2f8" stroke-width="2" opacity="0.55"
      d="M300 206 C 292 222 288 244 288 266 C 288 282 292 294 300 300"/>
    <!-- ponta / bico da viseira -->
    <path fill="url(#metal)"
      d="M269 262 C 262 264 256 262 254 256 C 253 251 256 247 261 248 C 264 252 267 257 269 262 Z"/>
    <!-- fresta de visão (occularium) -->
    <path fill="#20242e" stroke="#20242e" stroke-width="1"
      d="M283 234 C 298 229 316 229 322 234 C 316 239 298 239 283 234 Z"/>
    <!-- respiros -->
    <g stroke="#20242e" stroke-width="3.2" fill="none" stroke-linecap="round">
      <path d="M279 258 C 292 255 308 255 318 258"/>
      <path d="M277 270 C 291 267 306 267 316 270"/>
      <path d="M278 282 C 291 280 303 280 312 283"/>
    </g>
    <!-- brilho na calota -->
    <path fill="#ffffff" opacity="0.5" stroke="none"
      d="M330 206 C 342 208 350 216 352 226 C 344 218 336 214 328 214 C 327 210 328 207 330 206 Z"/>
    <!-- rebite / botão topo -->
    <circle cx="332" cy="196" r="5" fill="url(#goldDeep)" stroke="#6e4a06" stroke-width="1"/>
  </g>

  <!-- ===================== ESCUDO ===================== -->
  <g>
    <path fill="url(#blueField)" stroke="#0c1550" stroke-width="6" stroke-linejoin="round"
      d="M198 302
         Q198 296 204 296 L436 296 Q442 296 442 302
         L442 462
         C 442 544 402 606 320 664
         C 238 606 198 544 198 462 Z"/>
    <!-- borda interna dourada -->
    <path fill="none" stroke="url(#goldDeep)" stroke-width="4" opacity="0.85"
      d="M210 308 L430 308 L430 460 C 430 536 394 594 320 648 C 246 594 210 536 210 460 Z"/>

    <!-- 5 flores-de-lis (2-1-2) -->
    <use href="#fleur" transform="translate(272,372) scale(0.82)"/>
    <use href="#fleur" transform="translate(368,372) scale(0.82)"/>
    <use href="#fleur" transform="translate(320,468) scale(0.86)"/>
    <use href="#fleur" transform="translate(276,560) scale(0.8)"/>
    <use href="#fleur" transform="translate(364,560) scale(0.8)"/>
  </g>

  <!-- ===================== FAIXA GUEDES ===================== -->
  <g>
    <rect x="196" y="704" width="248" height="58" rx="10" fill="url(#gold)" stroke="#6e4a06" stroke-width="2"/>
    <rect x="204" y="712" width="232" height="42" rx="6" fill="none" stroke="#8a5a08" stroke-width="1" opacity="0.6"/>
    <text x="320" y="746" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700"
      fill="#3a2606" letter-spacing="2">Guedes</text>
  </g>
</svg>
