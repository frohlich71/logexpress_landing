<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo_guedes_traced.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LogExpress — moto-fretamento e entregas para farmácias de manipulação e laboratórios em São Paulo e Grande SP. Preço único de R$ 11,00, sem vínculo trabalhista, há mais de 10 anos no mercado."
    />
    <meta name="theme-color" content="#08080A" />
    <title>LogExpress — Serviços de Entregas para Farmácias e Laboratórios</title>
    <script>
      // Aplica o tema antes da pintura para evitar flash. Padrão: dark.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          document.documentElement.setAttribute(
            'data-theme',
            stored === 'light' || stored === 'dark' ? stored : 'dark',
          )
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
